# tachyne quickstart — one command, one world, every client.
#
#   docker compose up -d
#
#   Java  (1.21.5-1.21.8 or 26.2):  connect to  <this-host>:25565
#   Bedrock (latest):               connect to  <this-host>:19132
#
# The default is the CLASSIC experience: one world container, procedurally
# generated, effectively infinite, full survival. No sharding, no limits.
# Put your player name in TACHYNE_OPS to get op (/gamemode etc).
#
# Want to walk a 1:1-scale real Cape Town instead? Start with the earth
# overlay:   docker compose -f docker-compose.yml -f docker-compose.earth.yml up -d
#
# This stack runs OPEN (no whitelist) — fine on a LAN, not for the internet.
# For authorization, deploy tachyne-access and set TACHYNE_ACCESS_URL on the
# gateways (see github.com/tachyne/tachyne-access).

x-token: &token TACHYNE_ATTACH_TOKEN=quickstart-change-me

services:
  world:
    image: ghcr.io/tachyne/tachyne-world:latest
    command: ["-attach", ":25500",
              "-gamemode", "survival",
              "-ops", "${TACHYNE_OPS:-}"]
    environment:
      - ATTACH_TOKEN=quickstart-change-me
    volumes:
      - world-data:/var/world
    restart: unless-stopped

  gw-java-770:
    image: ghcr.io/tachyne/tachyne-gw-java-770:latest
    environment:
      - TACHYNE_LISTEN=:25570
      - TACHYNE_BACKEND=world:25500
      - *token
    depends_on: [world]
    restart: unless-stopped

  gw-java-776:
    image: ghcr.io/tachyne/tachyne-gw-java-776:latest
    environment:
      - TACHYNE_LISTEN=:25576
      - TACHYNE_BACKEND=world:25500
      - *token
    depends_on: [world]
    restart: unless-stopped

  gw-bedrock:
    image: ghcr.io/tachyne/tachyne-gw-bedrock:latest
    environment:
      - TACHYNE_LISTEN=:19132
      - TACHYNE_BACKEND=world:25500
      - *token
    depends_on: [world]
    restart: unless-stopped

  ingress:
    image: ghcr.io/tachyne/tachyne-ingress:latest
    environment:
      - INGRESS_LISTEN=:25565
      - INGRESS_ROUTES=770-772=gw-java-770:25570,776=gw-java-776:25576
      - INGRESS_BEDROCK_BACKEND=gw-bedrock:19132
      - INGRESS_PROXY=1
    ports:
      - "25565:25565"
      - "19132:19132/udp"
    depends_on: [gw-java-770, gw-java-776, gw-bedrock]
    restart: unless-stopped

volumes:
  world-data:
