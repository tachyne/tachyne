# tachyne quickstart — one command, one world, every client.
#
#   docker compose up -d
#
#   Java  (1.21.5-1.21.8 or 26.2):  connect to  <this-host>:25565
#   Bedrock (latest):               connect to  <this-host>:19132
#
# The default is the CLASSIC experience: one world container, procedurally
# generated, effectively infinite, full survival. No sharding, no limits.
# Put your player name in TACHYNE_OPS to get op (/gamemode etc).
#
# Want to walk a 1:1-scale real Cape Town instead? Start with the earth
# overlay:   docker compose -f docker-compose.yml -f docker-compose.earth.yml up -d
#
# This stack runs OPEN: no whitelist, no IP filtering, and Java logins are
# OFFLINE-MODE (no Mojang account verification — anyone can join under any
# name, including the op name). Great on a LAN with people you trust; do NOT
# expose it to the internet as-is. For authorization, deploy tachyne-access
# and set TACHYNE_ACCESS_URL on the gateways
# (see github.com/tachyne/tachyne-access).

x-token: &token TACHYNE_ATTACH_TOKEN=quickstart-change-me

services:
  world:
    image: ghcr.io/tachyne/tachyne-world:latest
    command: ["-attach", ":25500",
              "-gamemode", "survival",
              "-nats", "nats://nats:4222",
              "-ops", "${TACHYNE_OPS:-}"]
    environment:
      - ATTACH_TOKEN=quickstart-change-me
    volumes:
      - world-data:/var/world
    depends_on: [nats]
    restart: unless-stopped

  # The message bus: daemon plugins, the plugin manager's control plane, and
  # any external integration attach here.
  nats:
    image: nats:2.10
    restart: unless-stopped

  # The plugin manager: /plugin in game drives it — install/upgrade/remove
  # daemon plugins (built from source) while everything runs. The webmap
  # daemon serves on 8100 once installed.
  plugin-manager:
    image: ghcr.io/tachyne/tachyne-plugin-manager:latest
    command: ["-config", "/data/daemons.json",
              "-cache", "/data/cache",
              "-name", "manager"]
    environment:
      - NATS_URL=nats://nats:4222
      - TACHYNE_REGISTRY=http://registry:8080
      - BLUEMAP_WORLD=/world/world.gob # for the bluemap 3D-map plugin
      # BlueMap renders with Mojang's textures; uncomment to accept Mojang's
      # EULA (https://account.mojang.com/documents/minecraft_eula) so the
      # bluemap plugin may download them:
      # - BLUEMAP_ACCEPT_DOWNLOAD=true
    volumes:
      - plugin-data:/data
      - world-data:/world:ro # bluemap reads the world files directly
    ports:
      - "8100:8100" # webmap, once installed (/plugin → install webmap)
      - "8124:8124" # bluemap 3D map, once installed
    depends_on: [nats, registry]
    restart: unless-stopped

  # The plugin registry: search + install-by-name + out-of-date checks for
  # /plugin. Starts empty — list a plugin with one request, e.g. webmap:
  #   curl -X POST localhost:8080/v1/plugins   #        -d '{"module":"github.com/tachyne/tachyne-world/daemons/webmap"}'
  registry:
    image: ghcr.io/tachyne/tachyne-registry:latest
    volumes:
      - registry-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  gw-java-770:
    image: ghcr.io/tachyne/tachyne-gw-java-770:latest
    environment:
      - TACHYNE_LISTEN=:25570
      - TACHYNE_BACKEND=world:25500
      - *token
    depends_on: [world]
    restart: unless-stopped

  gw-java-776:
    image: ghcr.io/tachyne/tachyne-gw-java-776:latest
    environment:
      - TACHYNE_LISTEN=:25576
      - TACHYNE_BACKEND=world:25500
      - *token
    depends_on: [world]
    restart: unless-stopped

  gw-bedrock:
    image: ghcr.io/tachyne/tachyne-gw-bedrock:latest
    environment:
      - TACHYNE_LISTEN=:19132
      - TACHYNE_BACKEND=world:25500
      - *token
    depends_on: [world]
    restart: unless-stopped

  ingress:
    image: ghcr.io/tachyne/tachyne-ingress:latest
    environment:
      - INGRESS_LISTEN=:25565
      - INGRESS_ROUTES=770-772=gw-java-770:25570,776=gw-java-776:25576
      - INGRESS_BEDROCK_BACKEND=gw-bedrock:19132
      - INGRESS_PROXY=1
    ports:
      - "25565:25565"
      - "19132:19132/udp"
    depends_on: [gw-java-770, gw-java-776, gw-bedrock]
    restart: unless-stopped

volumes:
  world-data:
  plugin-data:
  registry-data:
